[project]
name = "hand2notes-storage"
version = "0.1.0"
description = "SQLite/SQLModel job state, pipeline runs, and artifact registry"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "sqlmodel>=0.0.21",
    "aiosqlite>=0.20",
    "greenlet>=3.0",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
