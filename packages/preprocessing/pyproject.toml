[project]
name = "hand2notes-preprocessing"
version = "0.1.0"
description = "OpenCV preprocessing: deskew, dewarp, denoise, normalize, semantics detection"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "opencv-python-headless>=4.9",
    "numpy>=1.26",
    "scikit-image>=0.23",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
