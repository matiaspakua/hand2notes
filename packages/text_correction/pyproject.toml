[project]
name = "hand2notes-text-correction"
version = "0.1.0"
description = "Post-OCR spell correction for Spanish and English using pyspellchecker"
requires-python = ">=3.12"
dependencies = [
    "pyspellchecker>=0.8",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
