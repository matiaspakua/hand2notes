[project]
name = "hand2notes-core-models"
version = "0.1.0"
description = "Canonical Pydantic v2 data models for the hand2notes pipeline"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
