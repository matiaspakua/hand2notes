[project]
name = "hand2notes-markdown-export"
version = "0.1.0"
description = "Markdown rendering, Obsidian front matter, and vault writer"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "jinja2>=3.1",
    "python-frontmatter>=1.1",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
