[project]
name = "hand2notes-ocr"
version = "0.1.0"
description = "OCR adapters: Docling, PaddleOCR, TrOCR, and URL detection"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "docling>=2.0",
    "paddleocr>=2.7",
    "transformers>=4.42",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
