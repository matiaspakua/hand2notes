[project]
name = "hand2notes-ingestion"
version = "0.1.0"
description = "Image import, ordering, and format validation"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "Pillow>=10.3",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
