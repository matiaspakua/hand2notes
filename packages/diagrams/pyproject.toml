[project]
name = "hand2notes-diagrams"
version = "0.1.0"
description = "Diagram classification, VLM interpretation, and PlantUML/draw.io generation"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
    "hand2notes-core-models",
]

[project.optional-dependencies]
llamacpp = ["llama-cpp-python>=0.2.80"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
