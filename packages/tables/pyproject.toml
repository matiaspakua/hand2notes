[project]
name = "hand2notes-tables"
version = "0.1.0"
description = "Table cell extraction and Markdown/CSV/image fallback rendering"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "opencv-python-headless>=4.9",
    "numpy>=1.26",
    "hand2notes-core-models",
    "hand2notes-ocr",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
