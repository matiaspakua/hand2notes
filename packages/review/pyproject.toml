[project]
name = "hand2notes-review"
version = "0.1.0"
description = "Confidence flagging, corrections, and review payload assembly"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
