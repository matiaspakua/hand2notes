[project]
name = "hand2notes-layout"
version = "0.1.0"
description = "Region detection, reading order (Surya), and visual semantics mapping"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "numpy>=1.26",
    "surya-ocr>=0.4",
    "hand2notes-core-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hand2notes"]
